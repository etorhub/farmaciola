name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Prevent two releases from running simultaneously; never cancel a running one.
concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.actor != 'github-actions[bot]' && !contains(github.event.workflow_run.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            requirements_dev.txt

      - name: Install dependencies
        run: pip install -r requirements_test.txt -r requirements_dev.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        id: bump
        run: |
          if ! cz bump --yes; then
            echo "No version-bumping commits since last release — skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read released version
        if: steps.bump.outputs.skipped != 'true'
        id: version
        run: echo "value=$(cz version -p)" >> "$GITHUB_OUTPUT"

      - name: Extract release notes for current version
        if: steps.bump.outputs.skipped != 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          version = "${{ steps.version.outputs.value }}"
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          header = f"## v{version}"
          start = changelog.find(header)
          if start == -1:
              raise SystemExit(f"Could not find section {header} in CHANGELOG.md")
          next_header = changelog.find("\n## ", start + len(header))
          section = changelog[start: next_header if next_header != -1 else None].strip()
          Path("release-notes.md").write_text(section + "\n", encoding="utf-8")
          PY

      - name: Push release commit and tags
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git push origin main
          git push origin --tags

      - name: Publish GitHub release
        if: steps.bump.outputs.skipped != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: release-notes.md
