name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.actor != 'github-actions[bot]' && !contains(github.event.workflow_run.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements_test.txt
            requirements_dev.txt

      - name: Install dependencies
        run: pip install -r requirements_test.txt -r requirements_dev.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        run: cz bump --yes

      - name: Read released version
        id: version
        run: echo "value=$(cz version -p)" >> "$GITHUB_OUTPUT"

      - name: Extract release notes for current version
        run: |
          python - <<'PY'
          from pathlib import Path

          version = "${{ steps.version.outputs.value }}"
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          header = f"## v{version}"
          start = changelog.find(header)
          if start == -1:
              raise SystemExit(f"Could not find section {header} in CHANGELOG.md")
          next_header = changelog.find("\n## ", start + len(header))
          section = changelog[start: next_header if next_header != -1 else None].strip()
          Path("release-notes.md").write_text(section + "\n", encoding="utf-8")
          PY

      - name: Push release commit and tags
        run: |
          git push origin main
          git push origin --tags

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: release-notes.md
