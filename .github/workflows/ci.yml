name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale PR runs on new pushes; never cancel push-to-main (release chain depends on it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_dev.txt
      - run: pip install -r requirements_dev.txt
      - run: pre-commit run --all-files

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            requirements_dev.txt
      - run: pip install -r requirements_test.txt -r requirements_dev.txt
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements_test.txt -r requirements_dev.txt
      - name: Static security analysis
        run: bandit -q -r custom_components/farmaciola/ -ll

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            requirements_dev.txt
      - run: pip install -r requirements_test.txt -r requirements_dev.txt
      - name: Run tests with coverage
        run: pytest --cov=custom_components/farmaciola --cov-report=term-missing --cov-fail-under=80
